<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UPI QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f5f5f5;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #qrcode {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h2>UPI QR Code Generator</h2>

    <input type="text" id="upi" placeholder="Enter UPI ID (e.g. name@upi)" /><br>
    <input type="number" id="amount" placeholder="Enter Amount" /><br>

    <button onclick="generateQR()">Generate QR</button>

    <div id="qrcode"></div>

    <script>
        function generateQR() {
            let upi = document.getElementById("upi").value;
            let amount = document.getElementById("amount").value;

            if (!upi || !amount) {
                alert("Please enter both UPI ID and Amount");
                return;
            }

            // UPI Payment URL
            let upiURL = `upi://pay?pa=${upi}&pn=Receiver&am=${amount}&cu=INR`;

            // Clear old QR
            document.getElementById("qrcode").innerHTML = "";

            // Generate QR
            new QRCode(document.getElementById("qrcode"), {
                text: upiURL,
                width: 200,
                height: 200
            });
        }
    </script>

</body>

</html>
